    # Slaying tier 0 (Common)
    - SPAWNER:1:0:::CHICKEN
    - SPAWNER:1:0:::PIG
    # Mining tier 1 (Common/Uncommon)
    - COAL_ORE:6:1
    - ANDESITE:6:1
    - GRANITE:6:1
    - DIORITE:6:1
