# ────────────────────────────────────────────────────────────────────────────
# ONE BLOCK CONFIGURATION
# ────────────────────────────────────────────────────────────────────────────
# Defines the One Block rotation, Journey tasks, and daily one-block settings.
#
# ── BLOCK ENTRY FORMAT ──────────────────────────────────────────────────────
# Each entry under blocks: is a colon-separated string:
#
#   MATERIAL:WEIGHT:TIER
#   MATERIAL:WEIGHT:TIER:DROP_MAT:DROP_AMT
#   SPAWNER:WEIGHT:TIER:::MOB_TYPE
#
#   MATERIAL   Bukkit Material name of the block to place (use SPAWNER for mob entries).
#   WEIGHT     Integer. Higher weight = more frequent relative to other entries at this tier.
#   TIER       Integer 0–10. Minimum Resource Access perk level required.
#              Players with perk 0 can only get tier 0 blocks;
#              perk 1 unlocks tiers 0–1, and so on up to perk 10.
#   DROP_MAT   (Optional) Override the drop to a different material.
#   DROP_AMT   (Optional) Amount to give when DROP_MAT is set.
#   MOB_TYPE   (For SPAWNER entries only) Bukkit EntityType to spawn when this block is broken.
#              Player must have Slaying Resource Access perk >= TIER.
#
# Examples:
#   COAL_ORE:6:1              — Coal Ore with weight 6, unlocks at tier 1
#   HAY_BLOCK:4:0:WHEAT:4     — Hay Block placed, but gives 4 Wheat on break
#   SPAWNER:1:2:::ZOMBIE       — Zombie spawns on break, unlocks at tier 2
#
# ── GENERATOR ENTRY FORMAT ──────────────────────────────────────────────────
# Generator material lists define what items generators can produce.
# Each entry: MATERIAL:TIER — same tier gating as One Block blocks.
# ────────────────────────────────────────────────────────────────────────────

oneblock:
  fallback-material: STONE
  stages:
  - name: oneblock
    required-breaks: 0
    blocks:
    # Mining tier 0 (Common)
    - STONE:9:0
    - DIRT:9:0
    - SAND:9:0
    - GRAVEL:9:0
    # Farming tier 0 (Common)
    - OAK_LOG:6:0
