# ────────────────────────────────────────────────────────────────────────────
# JOURNEY TASKS
# ────────────────────────────────────────────────────────────────────────────
# Defines the ordered list of player journey tasks shown in /journey.
#
# Each task key must be unique (lowercase, underscores). Tasks display in the
# order they appear here.
#
# Fields:
#   display-name   Text shown as the item name in the Journey GUI.
#   description    One-line hint shown in lore.
#   icon           (Optional) Bukkit Material to use as the item icon.
#                  If omitted, the icon is a colored dye based on task state:
#                    Claimed   → Lime Dye  (green)
#                    Active    → Yellow Dye
#                    Locked    → Red Dye
#   type           Task completion trigger (see types below).
#   match          Match key for the type (see per-type notes below).
#   target         Quantity required to complete.
#   reward-money   Money given on claim (optional).
#   reward-skill-xp  Skill XP given on claim (optional).
#   reward-player-xp Player XP given on claim (optional).
#   reward-items   List of MATERIAL:AMOUNT items given on claim (optional).
#   reward-fragments  List of fragmentKey:amount on claim (optional).
#
# Task types:
#   BREAK_BLOCK         Break a specific block. match = Bukkit Material (lowercase).
#   KILL_MOB            Kill a specific mob. match = EntityType (lowercase).
#   CRAFT_ITEM          Craft a node or spawner. match = "node:<type>" or "spawner:<type>".
#   USE_COMMAND         Run a command. match = command string (without /).
#   ONEBLOCK_BREAK      Break any One Block. No match needed.
#   REACH_SKILL_LEVEL   Reach a skill level. match = "mining" | "farming" | "slaying".
#   REACH_MILESTONE_TIER  Claim a milestone tier. match = "track:key" (e.g. mining:stone).
#   REACH_PERK_LEVEL    Upgrade a perk. match = "track:perkIndex:level" (e.g. mining:1:3).
#   EXPAND_GROWTH_LIMIT  Upgrade a growth limit. match = material key (e.g. wheat).
#   COMPLETE_DAILY      Complete a daily task stage. match = task key (e.g. mine-resources).
# ────────────────────────────────────────────────────────────────────────────

header:
  material: COMPASS
  name: '&eᴘʟᴀʏᴇʀ ᴊᴏᴜʀɴᴇʏ'
  lore:
  - '&7Complete tasks in order to progress'
  - '&7through the island journey.'
  - '&7'
  - '&a&oɢʀᴇᴇɴ &7= ᴄʟᴀɪᴍᴇᴅ  &e&oʏᴇʟʟᴏᴡ &7= ɪɴ ᴘʀᴏɢʀᴇꜱꜱ  &c&oʀᴇᴅ &7= ʟᴏᴄᴋᴇᴅ'

