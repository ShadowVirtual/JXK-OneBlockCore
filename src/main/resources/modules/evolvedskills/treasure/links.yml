# Treasure drop links — maps resources to treasure pools with drop chances.
#
# resource-key: lowercase material name (blocks/node outputs) or entity type name (mobs)
# Multiple pools per resource are rolled independently on each harvest.
#
# Format:
#   resource_key:
#     - pool: pool-name
#       chance: 0.05   # 0.0–1.0 (e.g. 0.05 = 5% per harvest)

links:

