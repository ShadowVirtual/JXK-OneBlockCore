  # ────────────────────────────────────────────────────────────────────────────
  # DAILY CHALLENGES
  # ────────────────────────────────────────────────────────────────────────────
  # How it works:
  #   - Each day, `count` challenges are randomly selected from the pool below.
  #   - Players see challenges based on which SLOT permission nodes they hold.
  #   - Slot 1 = evolvedskills.challenges.1, Slot 2 = evolvedskills.challenges.2 … up to 14.
  #   - A player with perms for slots 1-3 sees 3 random challenges per day.
  #   - Challenges reset at the daily reset time (see daily-reset section above).
  #
  # Assigning slots to ranks via LuckPerms:
  #   lp group default permission set evolvedskills.challenges.1 true
  #   lp group vip permission set evolvedskills.challenges.1 true
  #   lp group vip permission set evolvedskills.challenges.2 true
  #   lp group vip permission set evolvedskills.challenges.3 true
  #   lp group mvp permission set evolvedskills.challenges.1 true
  #   ... (and so on up to evolvedskills.challenges.14)
  #
  # Challenge fields:
  #   display-name  — Name shown on the item in the GUI.
  #   description   — One-line objective shown in item lore. Use %amount% for the target.
  #   icon          — Material name for the inventory icon.
  #   match         — Resource key to track (lowercase material or entity type name).
  #                   Mining: coal_ore, iron_ore, gold_ore, diamond_ore, emerald_ore,
  #                           lapis_ore, redstone_ore, nether_quartz_ore, copper_ore,
  #                           ancient_debris, amethyst_block, raw_iron, raw_gold, raw_copper,
  #                           coal, diamond, redstone, glowstone, quartz, amethyst_shard
  #                   Farming: oak_log, birch_log, spruce_log, dark_oak_log, acacia_log,
  #                            jungle_log, crimson_stem, warped_stem, wheat, carrot, potato,
  #                            beetroot, melon, melon_slice, pumpkin, cactus, sugar_cane,
  #                            bamboo, sweet_berries, nether_wart, kelp, hay_block,
  #                            cocoa_beans, glow_berries, brown_mushroom_block, red_mushroom_block
  #                   Mobs:   zombie, skeleton, spider, cave_spider, creeper, enderman,
  #                           blaze, wither_skeleton, ghast, shulker, strider, guardian,
  #                           piglin, piglin_brute, zombified_piglin, drowned, husk, stray,
  #                           bogged, phantom, breeze, slime, magma_cube, warden,
  #                           cow, pig, sheep, chicken, rabbit, mushroom_cow, squid
  #   amount        — How many times the player must trigger the match to complete.
  #   reward:
  #     money       — Vault money reward on claim.
  #     player-xp   — Player XP reward on claim.
  # ────────────────────────────────────────────────────────────────────────────
