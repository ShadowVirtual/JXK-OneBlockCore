  local-time: 00:00
# ────────────────────────────────────────────────────────────────────────────
# MESSAGES
# ────────────────────────────────────────────────────────────────────────────
# All player-facing messages sent by the plugin.
# Color codes: use & followed by a color code (e.g. &a = green, &c = red, &7 = gray,
# &6 = gold, &f = white, &b = aqua, &e = yellow). Use &l for bold, &r to reset.
#
# Available placeholders by key (not all keys use all placeholders):
#   %track%      — Skill track name (Mining / Farming / Slaying)
#   %level%      — Level number
#   %tier%       — Upgrade tier number
#   %name%       — Display name (milestone, node type, spawner type, challenge, etc.)
#   %type%       — Node or spawner type name
#   %amount%     — Quantity of items
#   %material%   — Readable material name
#   %cost%       — Money cost (formatted with commas, e.g. $1,000.00)
#   %limit%      — Placement limit count
#   %seconds%    — Cooldown remaining in seconds
#   %task%       — Journey or daily task display name
#   %progress%   — Current task progress count
#   %target%     — Task completion target
#   %current%    — Current count (used in daily one-block requirement message)
#   %pool%       — Treasure pool name
#   %error%      — Error detail string
#   %rewards%    — Formatted reward summary string
#   %fragments%  — Fragment quantity required
#   %count%      — Prestige count
#   %stage%      — Daily task stage number
#   %skill_xp%   — Skill XP awarded (in milestone-claimed)
#   %player_xp%  — Player XP awarded (in milestone-claimed / daily-stage-claimed)
#   %perk%       — Perk name (in perk-upgraded)
#   %required%   — Required count (in milestone-requirements-not-met)
# ────────────────────────────────────────────────────────────────────────────
messages:
  # Plugin prefix — prepended to every message sent by EvolvedSkills.
  prefix: '&8[&aEvolvedSkills&8] &7'

  # One Block
  island-created: '&aYour island has been created! Break your One Block to get started.'
  daily-oneblock-already-claimed: '&cYou already claimed today''s one-block daily reward.'
  daily-oneblock-requirement-not-met: '&cRequirement not met. Break &f%target% &cone-blocks today (current: &f%current%&c).'

  # Daily Tasks
  daily-reset: '&aYour daily tasks have reset! New challenges await.'
  daily-stage-claimed: '&aYou claimed stage &f%stage% &aof &f%task%&7! +%player_xp% Player XP.'
  daily-all-claimed: '&bAll daily stages claimed! Come back tomorrow.'
  daily-task-stage-ready: '&6%task% &aStage &f%stage% &ais ready to claim!'
  daily-task-unconfigured: '&cThis daily task is no longer configured.'
  daily-stage-not-ready: '&cStage not complete for &f%task%&c. Still need &f%remaining%&c more.'

  # Daily Challenges
  challenge-complete: '&6Challenge Complete! &f%name% &7is ready to claim.'
  challenge-already-claimed: '&7This challenge has already been claimed.'
  challenge-not-complete: '&cChallenge not yet complete.'

  # Skills & Player Levels
  skill-level-up: '&6&lSkill Level Up! &r&a%track% &7is now level &f%level%&7.'
  player-level-up: '&b&lPlayer Level Up! &r&7You are now Player Level &f%level%&7.'
  player-level-reward-already-claimed: '&7You already claimed level &f%level% &7reward.'
  player-level-reward-locked: '&cYou need Player Level &f%level% &cto claim this reward.'
  prestige-insufficient-funds: '&cNot enough money to prestige. Cost: &f$%cost%&c.'
  prestige-success: '&6&lPrestige! &7You are now Prestige &f%count%&7. Stats reset.'

  # Milestones
  milestone-claimed: '&aYou claimed &f%name% &7tier %tier%! +%skill_xp% Skill XP, +%player_xp% Player XP.'
  milestone-all-claimed: '&7All tiers for &f%name% &7are already claimed.'
  milestone-requirements-not-met: '&cRequirements not met. Need &f%required% &c%name%, have &f%progress%&c.'
  milestone-ready: '&6Milestone Ready! &f%name% &7Tier &f%tier% &7— Open Skills to claim.'

  # Perks
  perk-upgraded: '&aUpgraded &f%perk% &7to tier &f%tier%&7!'
  perk-max-tier: '&cThis perk is already at maximum tier.'
  perk-insufficient-funds: '&cYou need &f$%cost% &cto upgrade this perk.'
  perk-locked: '&cYou must reach &f%track% &cLevel &f%level% &cto unlock this perk slot.'

  # Journey
  journey-task-locked: '&cThis journey task is still locked.'
  journey-task-already-claimed: '&7Journey task &f%task% &7already claimed.'
  journey-task-incomplete: '&cTask incomplete: &f%task% &7(&f%progress%&7/&f%target%&7).'
  journey-task-complete: '&6Journey Task Complete! &f%task% &7— Open the Journey menu to claim.'

  # Resource Nodes
  node-placed: '&aYou placed a &f%type% &aResource Node.'
  node-reclaimed: '&aYou reclaimed your &f%type% &aResource Node.'
  node-harvest: '&aHarvested &f%amount%x %type% &afrom your Resource Node.'
  node-on-cooldown: '&cThis node is on cooldown for &f%seconds%s&c.'
  node-limit-reached: '&cYou''ve reached the limit for &f%type% &cNodes (%limit%). Open Mining/Farming Limits to upgrade.'
  node-limit-upgraded: '&aYour &f%type% &aNode limit upgraded to tier &f%tier%&a!'
  node-upgrade-insufficient-funds: '&cNot enough money. Node upgrade cost: &f$%cost%&c.'
  node-upgrade-insufficient-fragments: '&cNot enough fragments. Upgrade requires &f%fragments% &c%type% Fragment(s).'
  node-upgraded: '&aNode upgraded to level &f%level%&a.'
  node-max-level: '&cThis node is already at max level.'
  node-not-your-island: '&cYou can only harvest nodes on your own island.'
  node-type-unconfigured: '&cNode type is no longer configured.'

  # Spawners
  spawner-placed: '&aYou placed a &f%type% &aSpawner.'
  spawner-reclaimed: '&aYou reclaimed your &f%type% &aSpawner.'
  spawner-type-unconfigured: '&cSpawner type is no longer configured.'
  spawner-no-drops: '&7This spawner has no drops ready yet.'
  spawner-harvested: '&aHarvested &f%amount%x %material% &afrom your &f%name% &aSpawner.'
  spawner-limit-reached: '&cYou''ve reached the limit for &f%type% &cSpawners (%limit%). Open Slaying Limits to upgrade.'
  spawner-limit-upgraded: '&aYour &f%type% &aSpawner limit upgraded to tier &f%tier%&a!'
  spawner-upgrade-insufficient-funds: '&cNot enough money. Spawner upgrade cost: &f$%cost%&c.'
  spawner-upgraded: '&aSpawner upgraded to level &f%level%&a.'
  spawner-max-level: '&cThis spawner is already at max level.'

  # Generators
  generator-reclaimed: '&aGenerator reclaimed.'
  generator-wrong-island: '&cThis generator belongs to another island.'
  generator-storage-empty: '&7The &f%track% &7generator storage is empty.'
  generator-claimed: '&aClaimed all &f%track% &agenerator resources.'
  generator-limit-reached: '&cYou''ve reached the &f%track% &cGenerator limit (&f%limit%&c). Upgrade your Generator Limit perk.'
  generator-must-be-online: '&cYou must be online to claim generator storage.'

  # Growth Limits
  growth-limit-maxed: '&cGrowth limit for &f%type% &cis already maxed.'
  growth-limit-insufficient-fragments: '&cNot enough fragments. Upgrade requires &f%cost% &cFarming Fragment(s).'
  growth-limit-insufficient-funds: '&cNot enough money. Upgrade costs &f$%cost%&c.'
  growth-limit-upgraded: '&aGrowth limit for &f%type% &aupgraded to tier &f%tier%&a.'

  # Placement Limits (node & spawner caps per island)
  limits-need-island: '&cYou need an island to upgrade limits.'
  limits-node-maxed: '&c%type% Node limit is already maxed.'
  limits-spawner-maxed: '&c%type% Spawner limit is already maxed.'
  limits-node-upgraded: '&aUpgraded &f%type% &aNode limit to tier &f%tier%&a.'
  limits-spawner-upgraded: '&aUpgraded &f%type% &aSpawner limit to tier &f%tier%&a.'
  limits-node-insufficient-fragments: '&cNot enough fragments. Requires &f%fragments% &c%type% Fragment(s).'
  limits-spawner-insufficient-fragments: '&cNot enough fragments. Requires &f%fragments% &c%type% Fragment(s).'
  limits-insufficient-funds: '&cNot enough money. Limit upgrade cost: &f$%cost%&c.'

  # Treasure & Rewards
  fragment-drop: '&7+&f1 &7%type% Fragment'
  treasure-drop: '&7You found a &f%pool% &7Treasure Token!'
  treasure-empty-pool: '&7The &f%pool% &7treasure pool has no entries yet.'
  reward-received: '&7Reward: &f%rewards%'
  reward-money-failed: '&cFailed to deposit reward money: %error%'

  # Misc
  not-your-island: '&cYou can only do that on your own island.'
  location-occupied: '&cThis location is already occupied by another evolved object.'
